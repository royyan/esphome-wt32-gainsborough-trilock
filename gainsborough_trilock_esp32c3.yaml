# ESPHome config for ESP32-C3 (Gainsborough Trilock BLE bridge)
# Uses WiFi + BLE with coexistence management.
# The ESP32-C3 shares a single 2.4 GHz radio for both WiFi and BLE,
# so careful tuning is required for stable operation.

substitutions:
  device_name: "gainsborough-trilock"
  friendly_name: "Front Door Lock"

esphome:
  name: "${device_name}"
  friendly_name: "${friendly_name}"
  comment: "Gainsborough Freestyle Trilock BLE bridge on ESP32-C3 (WiFi+BLE)"
  on_boot:
    priority: 200
    then:
      - logger.log: "Waiting for WiFi before enabling BLE activity..."
      - wait_until:
          wifi.connected:
      - logger.log: "WiFi connected, BLE coexistence is now active."

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32_WIFI_SW_COEXIST_ENABLE: "y"
      CONFIG_BT_CTRL_COEX_PHY_CODED_TX_RX_PRIO_ENABLE: "y"
      CONFIG_BT_CTRL_SCAN_PRIO_HIGH: "y"
      CONFIG_BT_CTRL_COEX_PRIORITY_AUTO: "y"
      CONFIG_BT_CTRL_CHAN_ASSESS_ENABLE: "y"
      CONFIG_SW_COEXIST_PREFERENCE_BALANCE: "y"
      CONFIG_BT_CTRL_DFT_TX_PWR_LEVEL_P9: "y"
      CONFIG_MBEDTLS_GCM_C: "y"
      CONFIG_MBEDTLS_HARDWARE_GCM: "n"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"

external_components:
  - source: gainsborough_trilock

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: LIGHT
  output_power: 15dBm
  fast_connect: true
  ap:
    ssid: "${device_name} Fallback"
    password: !secret ota_password

captive_portal:
web_server:
  port: 81

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s
  services:
    - service: sync_cloud_refresh
      then:
        - lambda: |-
            id(trilock).sync_cloud_refresh();

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO
  baud_rate: 115200

esp32_ble_tracker:
  id: esp32_ble_tracker_hub
  scan_parameters:
    interval: 120ms
    window: 60ms
    active: false

ble_client:
  - mac_address: !secret trilock_ble_mac
    id: trilock_ble
    auto_connect: true
    on_connect:
      then:
        - logger.log: "Trilock BLE connected"
    on_disconnect:
      then:
        - logger.log: "Trilock BLE disconnected"

lock:
  - platform: gainsborough_trilock
    id: trilock
    name: "${friendly_name}"
    ble_client_id: trilock_ble
    aes_key: !secret trilock_aes_key
    sync_debug: false
    update_interval: 30s
    cloud:
      refresh_token: !secret freestyle_refresh_token
      property_id: !secret freestyle_property_id
      ble_mac: !secret freestyle_cloud_ble_mac
      client_id: !secret freestyle_client_id
      client_secret: !secret freestyle_client_secret
      update_interval: 5min
    icon: mdi:door-closed-lock
    lock_status_sensor:
      id: lock_status_text
      name: "${friendly_name} Detailed Status"
      icon: mdi:lock-check
    battery_level:
      name: "${friendly_name} Battery Level"
      id: battery_level
    battery_low:
      name: "${friendly_name} Battery Low"
      id: battery_low
    door_status:
      name: "${friendly_name} Door Status"
      id: door_status

button:
  - platform: template
    name: "${friendly_name} - Privacy Lock"
    id: btn_privacy_lock
    icon: mdi:door-closed-lock
    on_press:
      then:
        - lambda: |-
            id(trilock).set_target_state(2);

  - platform: template
    name: "${friendly_name} - Deadlock"
    id: btn_deadlock
    icon: mdi:shield-lock
    on_press:
      then:
        - lambda: |-
            id(trilock).set_target_state(3);

  - platform: template
    name: "${friendly_name} - Request Status"
    id: btn_request_status
    icon: mdi:refresh
    on_press:
      then:
        - lambda: |-
            id(trilock).request_status();

  - platform: restart
    name: "${friendly_name} Restart"
    id: btn_restart
    icon: mdi:restart
    entity_category: diagnostic

binary_sensor:
  - platform: template
    name: "${friendly_name} BLE Connected"
    id: ble_conn_status
    device_class: connectivity
    entity_category: diagnostic
    lambda: |-
      return id(trilock_ble).connected();

i2c:
  sda: 8
  scl: 9
  scan: true
  id: bus_a

sensor:
  - platform: bmp280_i2c
    address: 0x76
    i2c_id: bus_a
    temperature:
      name: "Room Temperature"
      id: "room_temp"
      oversampling: 2x
      filters:
        - offset: -5.7
        - throttle: 10s
    pressure:
      name: "Room Pressure"
      id: "room_pressure"
      oversampling: 16x
      unit_of_measurement: "hPa"
      accuracy_decimals: 2
      filters:
        - throttle: 10s
    iir_filter: 16x
    update_interval: 60s

  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic

  - platform: ble_rssi
    mac_address: !secret trilock_ble_mac
    name: "${friendly_name} BLE RSSI"
    entity_category: diagnostic

  - platform: uptime
    name: "${friendly_name} Uptime"
    update_interval: 60s
    entity_category: diagnostic

text_sensor:
  - platform: version
    name: "${friendly_name} ESPHome Version"
    entity_category: diagnostic
    hide_timestamp: true
    disabled_by_default: true

  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP Address"
      entity_category: diagnostic
    ssid:
      name: "${friendly_name} WiFi SSID"
      entity_category: diagnostic
      disabled_by_default: true

time:
  - platform: homeassistant
    id: ha_time
